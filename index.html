<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 FURRY CUP · 福瑞杯 · 官方赛事中心</title>

    <!-- ===== 网站图标（请替换为你的 Raw 链接） ===== -->
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/你的用户名/furrycup/main/furrycup.ico">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/你的用户名/furrycup/main/furrycup.ico">

    <!-- 现代字体 Inter 和 Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ---------- 全局变量：霓虹橙主题 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c12;
            color: #f0f4fa;
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态背景：网格 + 霓虹光晕 + 扫描线 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 94, 13, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(255, 200, 50, 0.05) 0%, transparent 35%),
                linear-gradient(0deg, transparent 49%, rgba(255, 94, 13, 0.02) 50%, transparent 51%),
                linear-gradient(90deg, transparent 49%, rgba(255, 94, 13, 0.02) 50%, transparent 51%);
            background-size: 100% 100%, 100% 100%, 80px 80px, 80px 80px;
            pointer-events: none;
            z-index: -1;
            animation: scan 12s linear infinite;
        }

        @keyframes scan {
            0% { background-position: 0 0, 0 0, 0 0, 0 0; }
            100% { background-position: 0 0, 0 0, 0 160px, 160px 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
            position: relative;
            z-index: 2;
        }

        /* ---------- 头部 ---------- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffc285, #ff5e0d, #ff3c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 94, 13, 0.6);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .hero .subhead {
            font-size: 1.2rem;
            color: #a0b3d9;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .hero .subhead span {
            background: rgba(255, 94, 13, 0.08);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 94, 13, 0.3);
            font-weight: 500;
        }

        /* ---------- 标签导航 ---------- */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 94, 13, 0.3);
            color: #cdd9ff;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.9rem 2.5rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn i {
            font-size: 1.2rem;
        }

        .tab-btn:hover {
            background: rgba(255, 94, 13, 0.2);
            border-color: #ff5e0d;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 16px 28px rgba(255, 94, 13, 0.3);
        }

        .tab-btn.active {
            background: linear-gradient(145deg, #ff5e0d, #ff3a00);
            border-color: #ffc285;
            color: #0a0c12;
            box-shadow: 0 10px 25px #ff5e0d;
            font-weight: 700;
        }

        /* ---------- 面板 ---------- */
        .panel {
            background: rgba(12, 17, 27, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 2rem 2rem;
            border: 1px solid rgba(255, 94, 13, 0.2);
            box-shadow: 0 30px 50px -20px #000, 0 0 0 1px rgba(255, 94, 13, 0.2) inset;
            animation: panelAppear 0.5s ease-out;
        }

        .panel h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid rgba(255, 94, 13, 0.5);
            padding-bottom: 0.6rem;
            width: fit-content;
        }

        .panel h2 i {
            color: #ff5e0d;
        }

        /* ---------- 排行榜（选手面板顶部） ---------- */
        .leaderboard {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255, 94, 13, 0.3);
        }

        .leaderboard h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ffc285;
        }

        .leaderboard-grid {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .leaderboard-card {
            background: #0f141f;
            border-radius: 24px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1 1 200px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leaderboard-rank {
            font-size: 2rem;
            font-weight: 800;
            color: #ff5e0d;
            opacity: 0.7;
            min-width: 40px;
        }

        .leaderboard-info {
            flex: 1;
        }

        .leaderboard-name {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .leaderboard-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: #aaa;
        }

        .leaderboard-stats span i {
            color: #ff5e0d;
            margin-right: 4px;
        }

        /* ---------- 网格卡片 ---------- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        /* 选手卡片 */
        .player-card, .team-card, .match-card {
            background: rgba(15, 20, 30, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 94, 13, 0.15);
            border-radius: 28px;
            padding: 1.5rem;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .player-card:hover, .team-card:hover, .match-card:hover {
            transform: translateY(-4px);
            border-color: #ff5e0d;
            box-shadow: 0 20px 30px -10px #ff5e0d40;
        }

        .player-id {
            font-family: monospace;
            background: #00000040;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #ff5e0d;
            border: 1px solid #ff5e0d40;
            margin-bottom: 0.8rem;
        }

        .player-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #00000030;
            border-radius: 20px;
            padding: 0.8rem;
            margin: 1rem 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffc285;
        }

        .kd-badge {
            background: linear-gradient(145deg, #ff5e0d20, #ff3a0020);
            border-radius: 30px;
            padding: 0.5rem;
            text-align: center;
            font-weight: 700;
            border: 1px solid #ff5e0d60;
            color: #ffc285;
        }

        /* 战队卡片 */
        .team-header h3 {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 0.5rem;
        }

        .team-members {
            list-style: none;
            background: #00000025;
            border-radius: 20px;
            padding: 1rem;
        }

        .team-members li {
            padding: 0.4rem 0;
            border-bottom: 1px solid #2f364b30;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .team-members i {
            color: #ff5e0d;
        }

        /* 比赛卡片（按日期分组） */
        .match-date-group {
            margin-bottom: 2.5rem;
        }

        .match-date-header {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-left: 0.5rem;
            border-left: 6px solid #ff5e0d;
            color: #ffc285;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .match-date-header i {
            color: #ff5e0d;
        }

        .match-teams {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .score {
            color: #ff5e0d;
            font-size: 2rem;
            font-weight: 800;
        }

        .match-status {
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-completed {
            background: #1f5a3b30;
            color: #9eff9e;
            border: 1px solid #4fb87b50;
        }

        .status-scheduled {
            background: #5a4a1f30;
            color: #ffd966;
            border: 1px solid #ffb34750;
        }

        .match-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 0.8rem;
            color: #a0b3d9;
            font-size: 0.9rem;
        }

        /* 加载/错误 */
        .loading, .error {
            text-align: center;
            padding: 3rem;
            border-radius: 30px;
        }
        .loading i { animation: spin 1s infinite linear; color: #ff5e0d; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { background: #2a1a1a; color: #ffa7a7; border: 1px solid #ff5e5e; }

        .footer {
            text-align: center;
            margin-top: 3rem;
            opacity: 0.5;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,94,13,0.2);
            padding-top: 2rem;
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes panelAppear { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🐾 FURRY CUP</h1>
            <div class="subhead">
                <span><i class="fa-regular fa-calendar"></i> 福瑞杯 · 创立于2026</span>
                <span><i class="fa-regular fa-users"></i> 海神开剥了 vs 雕长三万里</span>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" id="tabPlayers"><i class="fas fa-user-astronaut"></i> 选手数据</button>
            <button class="tab-btn" id="tabTeams"><i class="fas fa-shield-halved"></i> 战队信息</button>
            <button class="tab-btn" id="tabMatches"><i class="fas fa-trophy"></i> 比赛比分</button>
        </div>

        <!-- 选手面板 (包含排行榜) -->
        <div id="playersPanel" class="panel">
            <h2><i class="fas fa-user-astronaut"></i> 选手数据 · 击杀/死亡/助攻</h2>
            <div id="leaderboardContainer" class="leaderboard"><!-- 排行榜由JS动态渲染 --></div>
            <div id="playersContent" class="grid"><div class="loading"><i class="fas fa-spinner"></i> 加载选手数据中...</div></div>
        </div>

        <!-- 战队面板 -->
        <div id="teamsPanel" class="panel" style="display: none;">
            <h2><i class="fas fa-shield-halved"></i> 参赛战队</h2>
            <div id="teamsContent" class="grid"><div class="loading"><i class="fas fa-spinner"></i> 加载战队数据中...</div></div>
        </div>

        <!-- 比赛面板 (按日期分组) -->
        <div id="matchesPanel" class="panel" style="display: none;">
            <h2><i class="fas fa-trophy"></i> 比赛赛程 & 比分</h2>
            <div id="matchesContent" class="grid"><div class="loading"><i class="fas fa-spinner"></i> 加载比赛数据中...</div></div>
        </div>

        <div class="footer">
            <i class="fa-regular fa-heart"></i> 数据托管于 GitHub · 福瑞杯专属 · 手动更新 <i class="fa-regular fa-heart"></i>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 配置：数据文件路径 ----------
            const DATA_PATH = './data/';   // 请确保 data 文件夹与 index.html 同级

            // DOM 元素
            const playersPanel = document.getElementById('playersPanel');
            const teamsPanel = document.getElementById('teamsPanel');
            const matchesPanel = document.getElementById('matchesPanel');
            const playersContent = document.getElementById('playersContent');
            const teamsContent = document.getElementById('teamsContent');
            const matchesContent = document.getElementById('matchesContent');
            const leaderboardContainer = document.getElementById('leaderboardContainer');

            const tabPlayers = document.getElementById('tabPlayers');
            const tabTeams = document.getElementById('tabTeams');
            const tabMatches = document.getElementById('tabMatches');

            let playersData = [], teamsData = [], matchesData = [];

            async function fetchLocalJSON(filename) {
                const url = DATA_PATH + filename;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status} : 无法加载 ${filename}`);
                return await res.json();
            }

            // 渲染排行榜（按击杀数取前5）
            function renderLeaderboard(players) {
                if (!players || players.length === 0) return '';
                const sorted = [...players].sort((a,b) => (b.kills||0) - (a.kills||0)).slice(0,5);
                let html = '<h3><i class="fas fa-crown"></i> 击杀榜 TOP5</h3><div class="leaderboard-grid">';
                sorted.forEach((p, idx) => {
                    const kd = p.deaths ? (p.kills / p.deaths).toFixed(2) : p.kills;
                    html += `
                        <div class="leaderboard-card">
                            <div class="leaderboard-rank">#${idx+1}</div>
                            <div class="leaderboard-info">
                                <div class="leaderboard-name">${p.name || p.id}</div>
                                <div class="leaderboard-stats">
                                    <span><i class="fas fa-skull"></i> ${p.kills||0}</span>
                                    <span><i class="fas fa-bolt"></i> ${kd}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                return html;
            }

            // 渲染选手卡片
            function renderPlayers(players) {
                if (!players || !players.length) return '<div class="error">暂无选手数据</div>';
                let html = '';
                players.forEach(p => {
                    const kills = p.kills || 0;
                    const deaths = p.deaths || 0;
                    const assists = p.assists || 0;
                    const kd = deaths === 0 ? kills.toFixed(2) : (kills / deaths).toFixed(2);
                    html += `
                        <div class="player-card">
                            <div class="player-id">${p.id || '--'}</div>
                            <div class="player-name">${p.name || '无名'}</div>
                            <div class="stats">
                                <div class="stat-item"><span class="stat-label">击杀</span><div class="stat-value">${kills}</div></div>
                                <div class="stat-item"><span class="stat-label">死亡</span><div class="stat-value">${deaths}</div></div>
                                <div class="stat-item"><span class="stat-label">助攻</span><div class="stat-value">${assists}</div></div>
                            </div>
                            <div class="kd-badge"><i class="fas fa-bolt"></i> KD: ${kd}</div>
                        </div>
                    `;
                });
                return html;
            }

            // 渲染战队卡片
            function renderTeams(teams) {
                if (!teams || !teams.length) return '<div class="error">暂无战队数据</div>';
                let html = '';
                teams.forEach(t => {
                    html += `
                        <div class="team-card">
                            <div class="team-header"><h3>${t.name || '未知战队'}</h3></div>
                            <div style="opacity:0.6; font-size:0.9rem; margin-bottom:1rem;"><i class="fas fa-tag"></i> ${t.id}</div>
                            <div class="team-members">
                                <li style="list-style:none; color:#ff5e0d;"><i class="fas fa-users"></i> 队员列表</li>
                                ${t.players ? t.players.map(pid => `<li><i class="fas fa-paw"></i> ${pid}</li>`).join('') : '<li>暂无队员</li>'}
                            </div>
                        </div>
                    `;
                });
                return html;
            }

            // 渲染比赛（按日期分组）
            function renderMatches(matches, teams) {
                if (!matches || !matches.length) return '<div class="error">暂无比赛数据</div>';

                // 获取队名辅助函数
                const getTeamName = (id) => {
                    const t = teams.find(t => t.id === id);
                    return t ? t.name : id;
                };

                // 按日期分组
                const groups = {};
                matches.forEach(m => {
                    const date = m.date || '待定';
                    if (!groups[date]) groups[date] = [];
                    groups[date].push(m);
                });

                // 排序日期（最近的在前）
                const sortedDates = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));

                let html = '';
                sortedDates.forEach(date => {
                    const isToday = date === new Date().toISOString().slice(0,10);
                    const isTomorrow = new Date(date) - new Date() > 0 && new Date(date) - new Date() < 86400000*2;
                    let dateLabel = date;
                    if (isToday) dateLabel = '今天';
                    else if (isTomorrow) dateLabel = '明天';

                    html += `<div class="match-date-group"><div class="match-date-header"><i class="fa-regular fa-calendar"></i> ${dateLabel}</div>`;

                    groups[date].forEach(m => {
                        const teamAName = getTeamName(m.teamA?.id);
                        const teamBName = getTeamName(m.teamB?.id);
                        const scoreA = m.teamA?.score ?? 0;
                        const scoreB = m.teamB?.score ?? 0;
                        const statusClass = m.status === 'completed' ? 'status-completed' : (m.status === 'scheduled' ? 'status-scheduled' : '');
                        const statusText = m.status === 'completed' ? '已结束' : (m.status === 'scheduled' ? '未开始' : m.status);
                        const timeStr = m.time ? `<i class="fa-regular fa-clock"></i> ${m.time}` : '';

                        html += `
                            <div class="match-card">
                                <div class="match-teams">
                                    <span>${teamAName}</span>
                                    <span class="score">${scoreA} : ${scoreB}</span>
                                    <span>${teamBName}</span>
                                </div>
                                <div class="match-footer">
                                    <span class="match-status ${statusClass}">${statusText}</span>
                                    <span>${timeStr}</span>
                                </div>
                                ${m.maps && m.maps.length ? `<div style="margin-top:0.8rem; opacity:0.7;"><i class="fa-regular fa-map"></i> ${m.maps.join(' · ')}</div>` : ''}
                            </div>
                        `;
                    });
                    html += '</div>';
                });
                return html;
            }

            async function loadAllData() {
                try {
                    const [players, teams, matches] = await Promise.all([
                        fetchLocalJSON('players.json'),
                        fetchLocalJSON('teams.json'),
                        fetchLocalJSON('matches.json')
                    ]);
                    playersData = players;
                    teamsData = teams;
                    matchesData = matches;

                    // 渲染排行榜 + 选手卡片
                    leaderboardContainer.innerHTML = renderLeaderboard(playersData);
                    playersContent.innerHTML = renderPlayers(playersData);

                    // 渲染战队
                    teamsContent.innerHTML = renderTeams(teamsData);

                    // 渲染比赛
                    matchesContent.innerHTML = renderMatches(matchesData, teamsData);
                } catch (error) {
                    console.error(error);
                    const errHtml = `<div class="error"><i class="fas fa-exclamation-triangle"></i> 加载失败: ${error.message}</div>`;
                    playersContent.innerHTML = errHtml;
                    teamsContent.innerHTML = errHtml;
                    matchesContent.innerHTML = errHtml;
                }
            }

            // 标签切换
            function showPanel(name) {
                playersPanel.style.display = 'none';
                teamsPanel.style.display = 'none';
                matchesPanel.style.display = 'none';
                tabPlayers.classList.remove('active');
                tabTeams.classList.remove('active');
                tabMatches.classList.remove('active');

                if (name === 'players') {
                    playersPanel.style.display = 'block';
                    tabPlayers.classList.add('active');
                } else if (name === 'teams') {
                    teamsPanel.style.display = 'block';
                    tabTeams.classList.add('active');
                } else if (name === 'matches') {
                    matchesPanel.style.display = 'block';
                    tabMatches.classList.add('active');
                }
            }

            tabPlayers.addEventListener('click', () => showPanel('players'));
            tabTeams.addEventListener('click', () => showPanel('teams'));
            tabMatches.addEventListener('click', () => showPanel('matches'));

            loadAllData();
        })();
    </script>
</body>
</html>
