<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FURRY CUP · 福瑞杯 · 电竞中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site-wrapper">
        <!-- 顶部导航栏 -->
        <header class="main-header">
            <div class="container">
                <nav class="top-nav">
                    <a href="#" class="logo">FURRY CUP</a>
                    <div class="nav-links">
                        <a href="#" class="active">所有赛事</a>
                        <a href="#">前哨战</a>
                        <a href="#">大师赛</a>
                        <a href="#">冠军赛</a>
                    </div>
                    <div class="user-actions">
                        <span class="icon">🔔</span>
                        <span class="icon">👤</span>
                    </div>
                </nav>
            </div>
        </header>

        <!-- 主内容区：时间轴 + 赛程 + 排名 -->
        <main class="main-content container">
            <!-- 左侧时间轴 (Timeline) -->
            <aside class="timeline-sidebar">
                <div class="timeline-header">
                    <h3>所有地区</h3>
                    <span class="tournament-count">2项赛事</span>
                </div>
                <div class="timeline-stages" id="timelineStages">
                    <!-- 动态通过JS渲染赛事阶段 -->
                    <div class="loading">⏳ 加载阶段...</div>
                </div>
            </aside>

            <!-- 中央赛程区 (Schedule) -->
            <section class="schedule-area">
                <div class="schedule-header">
                    <h2>今天</h2>
                    <span class="date-range">2026年3月14日</span>
                </div>
                <div id="matchesList" class="matches-list">
                    <!-- 动态通过JS渲染比赛卡片 -->
                    <div class="loading">⏳ 加载赛程...</div>
                </div>
            </section>

            <!-- 右侧实力排名 (Power Rankings) -->
            <aside class="rankings-sidebar">
                <div class="rankings-header">
                    <h3>全球实力排名</h3>
                </div>
                <div id="rankingsList" class="rankings-list">
                    <!-- 动态通过JS渲染排名 -->
                    <div class="loading">⏳ 加载排名...</div>
                </div>
            </aside>
        </main>

        <!-- 底部信息（可选） -->
        <footer class="main-footer">
            <div class="container">
                <p>© 2026 FURRY CUP · 同学自办赛事</p>
            </div>
        </footer>
    </div>

    <!-- 队员详情模态框 (Modal) -->
    <div class="modal-overlay" id="playerModal">
        <div class="modal">
            <button class="modal-close">&times;</button>
            <h3 id="modalTeamName">队伍队员</h3>
            <div id="modalPlayerList" class="player-grid"></div>
        </div>
    </div>

    <script src="data/script.js"></script>
</body>
</html>
