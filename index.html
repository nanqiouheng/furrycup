<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Furry Cup · 福瑞杯 · 官方赛事中心</title>
    <!-- 引入现代字体：Inter 和 Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e14;
            color: #f0f4fa;
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态背景网格 + 光晕 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 180, 70, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(255, 100, 100, 0.05) 0%, transparent 35%),
                linear-gradient(0deg, transparent 24%, rgba(255, 215, 150, 0.03) 25%, rgba(255, 215, 150, 0.03) 26%, transparent 27%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(255, 215, 150, 0.03) 25%, rgba(255, 215, 150, 0.03) 26%, transparent 27%, transparent);
            background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
            position: relative;
            z-index: 2;
        }

        /* 头部区域 */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff6d5, #ffd966, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 180, 70, 0.3);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .hero .subhead {
            font-size: 1.2rem;
            color: #a0b3d9;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .hero .subhead span {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 180, 70, 0.2);
            font-weight: 500;
        }

        /* 标签导航 */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(20, 25, 40, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 180, 70, 0.2);
            color: #cdd9ff;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.9rem 2.2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .tab-btn i {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .tab-btn:hover {
            background: rgba(255, 180, 70, 0.15);
            border-color: rgba(255, 180, 70, 0.6);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 16px 28px rgba(255, 140, 0, 0.2);
        }

        .tab-btn.active {
            background: linear-gradient(145deg, #ffb347, #ff9f2c);
            border-color: #ffdb9d;
            color: #0b0e14;
            box-shadow: 0 10px 25px #ffb34770;
            font-weight: 700;
        }

        /* 主要内容卡片面板 */
        .panel {
            background: rgba(18, 23, 34, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.5rem 2.2rem;
            border: 1px solid rgba(255, 215, 150, 0.15);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 180, 70, 0.1) inset;
            animation: panelAppear 0.5s ease-out;
        }

        .panel h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid rgba(255, 180, 70, 0.4);
            padding-bottom: 0.8rem;
            width: fit-content;
            letter-spacing: -0.01em;
        }

        .panel h2 i {
            color: #ffb347;
            font-size: 2rem;
        }

        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.8rem;
        }

        /* 卡片通用设计 */
        .player-card, .team-card, .match-card {
            background: rgba(12, 17, 27, 0.7);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 200, 120, 0.1);
            border-radius: 32px;
            padding: 1.8rem 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .player-card::before, .team-card::before, .match-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 180, 70, 0.06), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 1;
        }

        .player-card:hover::before, .team-card:hover::before, .match-card:hover::before {
            opacity: 1;
        }

        .player-card:hover, .team-card:hover, .match-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 180, 70, 0.4);
            box-shadow: 0 25px 40px -10px #ffb34730;
        }

        .player-id {
            font-family: 'Space Grotesk', monospace;
            background: #00000030;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ffb347;
            border: 1px solid #ffb34740;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }

        .player-name {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: #fff;
            line-height: 1.3;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #00000025;
            border-radius: 24px;
            padding: 1rem 0.8rem;
            margin: 1.5rem 0 1rem;
            border: 1px solid #ffffff08;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffe484;
            line-height: 1.2;
        }

        .kd-badge {
            background: linear-gradient(145deg, #ffb34720, #ff8c0020);
            border-radius: 40px;
            padding: 0.6rem;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            border: 1px solid #ffb34760;
            color: #ffd966;
            backdrop-filter: blur(4px);
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .team-header h3 {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .team-members {
            list-style: none;
            background: #00000025;
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid #ffffff08;
        }

        .team-members li {
            padding: 0.6rem 0;
            border-bottom: 1px solid #2f364b30;
            font-family: 'Space Grotesk', monospace;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .team-members li:last-child {
            border-bottom: none;
        }

        .team-members i {
            color: #ffb347;
            width: 20px;
            font-size: 0.9rem;
        }

        .match-teams {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            font-family: 'Space Grotesk', sans-serif;
        }

        .score {
            color: #ffb347;
            font-size: 2.2rem;
            font-weight: 800;
            text-shadow: 0 0 10px #ffb34760;
        }

        .match-status {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #2f374e30;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-completed {
            background: #1f5a3b30;
            color: #b7ffb7;
            border-color: #4fb87b50;
        }
        .status-scheduled {
            background: #5a4a1f30;
            color: #ffe484;
            border-color: #ffb34750;
        }

        .match-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
            color: #a0b3d9;
            font-size: 0.95rem;
        }

        .match-footer i {
            margin-right: 4px;
            color: #ffb347;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 4rem;
            color: #a0b3d9;
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .loading i {
            font-size: 2.5rem;
            color: #ffb347;
            animation: spin 1.5s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #2a1a1a;
            border-radius: 32px;
            padding: 2.5rem;
            text-align: center;
            color: #ffa7a7;
            border: 1px solid #ff5e5e40;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 3.5rem;
            opacity: 0.6;
            font-size: 0.9rem;
            color: #a0b3d9;
            border-top: 1px solid #ffffff10;
            padding-top: 2rem;
        }

        /* 动画定义 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes panelAppear {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 响应式微调 */
        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            .panel { padding: 1.8rem; }
            .hero h1 { font-size: 2.8rem; }
        }

        /* 鼠标移动光效 (通过JS更新CSS变量) */
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🐾 FURRY CUP</h1>
            <div class="subhead">
                <span><i class="fa-regular fa-calendar"></i> 福瑞杯 · 创立于2026</span>
                <span><i class="fa-regular fa-users"></i> 海神开剥了 vs 雕长三万里</span>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" id="tabPlayers"><i class="fas fa-user-astronaut"></i> 选手数据</button>
            <button class="tab-btn" id="tabTeams"><i class="fas fa-shield-halved"></i> 战队信息</button>
            <button class="tab-btn" id="tabMatches"><i class="fas fa-trophy"></i> 比赛比分</button>
        </div>

        <!-- 选手面板 -->
        <div id="playersPanel" class="panel">
            <h2><i class="fas fa-user-astronaut"></i> 选手数据 · 击杀/死亡/助攻</h2>
            <div id="playersContent" class="grid">
                <div class="loading"><i class="fas fa-spinner"></i> 加载选手数据中...</div>
            </div>
        </div>

        <!-- 战队面板 (初始隐藏) -->
        <div id="teamsPanel" class="panel" style="display: none;">
            <h2><i class="fas fa-shield-halved"></i> 参赛战队</h2>
            <div id="teamsContent" class="grid">
                <div class="loading"><i class="fas fa-spinner"></i> 加载战队数据中...</div>
            </div>
        </div>

        <!-- 比赛面板 (初始隐藏) -->
        <div id="matchesPanel" class="panel" style="display: none;">
            <h2><i class="fas fa-trophy"></i> 比赛赛程 & 比分</h2>
            <div id="matchesContent" class="grid">
                <div class="loading"><i class="fas fa-spinner"></i> 加载比赛数据中...</div>
            </div>
        </div>

        <div class="footer">
            <i class="fa-regular fa-heart"></i> 数据托管于 GitHub · 福瑞杯专属 · 手动更新 <i class="fa-regular fa-heart"></i>
        </div>
    </div>

    <script>
        (function() {
            // 配置：数据文件路径（相对于网站根目录）
            const DATA_PATH = './data/';  // 确保 data 文件夹和 index.html 同级

            // DOM 元素
            const playersPanel = document.getElementById('playersPanel');
            const teamsPanel = document.getElementById('teamsPanel');
            const matchesPanel = document.getElementById('matchesPanel');
            const playersContent = document.getElementById('playersContent');
            const teamsContent = document.getElementById('teamsContent');
            const matchesContent = document.getElementById('matchesContent');

            const tabPlayers = document.getElementById('tabPlayers');
            const tabTeams = document.getElementById('tabTeams');
            const tabMatches = document.getElementById('tabMatches');

            // 数据缓存
            let playersData = [];
            let teamsData = [];
            let matchesData = [];

            // 获取本地 JSON
            async function fetchLocalJSON(filename) {
                const url = `${DATA_PATH}${filename}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status} : 无法加载 ${filename}`);
                return await res.json();
            }

            // 加载所有数据
            async function loadAllData() {
                try {
                    const [players, teams, matches] = await Promise.all([
                        fetchLocalJSON('players.json').catch(e => { throw new Error(`选手数据: ${e.message}`); }),
                        fetchLocalJSON('teams.json').catch(e => { throw new Error(`战队数据: ${e.message}`); }),
                        fetchLocalJSON('matches.json').catch(e => { throw new Error(`比赛数据: ${e.message}`); })
                    ]);

                    playersData = players;
                    teamsData = teams;
                    matchesData = matches;

                    renderPlayers(playersData);
                    renderTeams(teamsData, playersData);
                    renderMatches(matchesData, teamsData);
                } catch (error) {
                    console.error(error);
                    const errorMsg = `<div class="error"><i class="fas fa-exclamation-triangle"></i> 加载失败: ${error.message}<br>请检查数据文件是否存在。</div>`;
                    playersContent.innerHTML = errorMsg;
                    teamsContent.innerHTML = errorMsg;
                    matchesContent.innerHTML = errorMsg;
                }
            }

            // 渲染选手
            function renderPlayers(players) {
                if (!players || !players.length) {
                    playersContent.innerHTML = '<div class="error">暂无选手数据</div>';
                    return;
                }
                let html = '';
                players.forEach(p => {
                    const kills = p.kills || 0;
                    const deaths = p.deaths || 0;
                    const assists = p.assists || 0;
                    const kd = deaths === 0 ? kills.toFixed(2) : (kills / deaths).toFixed(2);
                    html += `
                        <div class="player-card" data-mouse-move>
                            <div class="player-id">${p.id || '--'}</div>
                            <div class="player-name">${p.name || '无名'}</div>
                            <div class="stats">
                                <div class="stat-item"><span class="stat-label">击杀</span><div class="stat-value">${kills}</div></div>
                                <div class="stat-item"><span class="stat-label">死亡</span><div class="stat-value">${deaths}</div></div>
                                <div class="stat-item"><span class="stat-label">助攻</span><div class="stat-value">${assists}</div></div>
                            </div>
                            <div class="kd-badge"><i class="fas fa-bolt"></i> KD: ${kd}</div>
                        </div>
                    `;
                });
                playersContent.innerHTML = html;
                attachMouseMoveEffect();
            }

            // 渲染战队
            function renderTeams(teams, players) {
                if (!teams || !teams.length) {
                    teamsContent.innerHTML = '<div class="error">暂无战队数据</div>';
                    return;
                }
                let html = '';
                teams.forEach(t => {
                    html += `
                        <div class="team-card" data-mouse-move>
                            <div class="team-header">
                                <h3>${t.name || '未知战队'}</h3>
                            </div>
                            <div style="margin-bottom: 0.8rem; opacity:0.7; font-size:0.9rem;"><i class="fas fa-tag"></i> ID: ${t.id}</div>
                            <div class="team-members">
                                <li style="list-style: none; font-weight:600; color:#ffb347; padding-bottom:0.5rem;"><i class="fas fa-users"></i> 队员列表</li>
                                ${t.players ? t.players.map(pid => `<li><i class="fas fa-paw"></i> ${pid}</li>`).join('') : '<li><i class="fas fa-minus"></i> 暂无队员</li>'}
                            </div>
                        </div>
                    `;
                });
                teamsContent.innerHTML = html;
                attachMouseMoveEffect();
            }

            // 渲染比赛（包含时间）
            function renderMatches(matches, teams) {
                if (!matches || !matches.length) {
                    matchesContent.innerHTML = '<div class="error">暂无比赛数据</div>';
                    return;
                }
                function getTeamName(teamId) {
                    const t = teams.find(t => t.id === teamId);
                    return t ? t.name : teamId;
                }
                let html = '';
                matches.forEach(m => {
                    const teamAName = getTeamName(m.teamA?.id);
                    const teamBName = getTeamName(m.teamB?.id);
                    const scoreA = m.teamA?.score ?? 0;
                    const scoreB = m.teamB?.score ?? 0;
                    const statusClass = m.status === 'completed' ? 'status-completed' : (m.status === 'scheduled' ? 'status-scheduled' : '');
                    let dateTimeStr = `<i class="fa-regular fa-calendar"></i> ${m.date || '日期待定'}`;
                    if (m.time) dateTimeStr += ` <i class="fa-regular fa-clock"></i> ${m.time}`;
                    html += `
                        <div class="match-card" data-mouse-move>
                            <div class="match-teams">
                                <span>${teamAName}</span>
                                <span class="score">${scoreA} : ${scoreB}</span>
                                <span>${teamBName}</span>
                            </div>
                            <div class="match-footer">
                                <span class="match-status ${statusClass}">${m.status === 'completed' ? '已结束' : (m.status === 'scheduled' ? '未开始' : m.status)}</span>
                                <span>${dateTimeStr}</span>
                            </div>
                            ${m.maps && m.maps.length ? `<div style="margin-top: 1rem; font-size:0.9rem; opacity:0.7;"><i class="fa-regular fa-map"></i> 地图: ${m.maps.join(' · ')}</div>` : ''}
                        </div>
                    `;
                });
                matchesContent.innerHTML = html;
                attachMouseMoveEffect();
            }

            // 鼠标移动光效 (让卡片上的径向渐变跟随鼠标)
            function attachMouseMoveEffect() {
                document.querySelectorAll('[data-mouse-move]').forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        card.style.setProperty('--mouse-x', x + 'px');
                        card.style.setProperty('--mouse-y', y + 'px');
                    });
                });
            }

            // 标签切换
            function showPanel(panelName) {
                playersPanel.style.display = 'none';
                teamsPanel.style.display = 'none';
                matchesPanel.style.display = 'none';
                tabPlayers.classList.remove('active');
                tabTeams.classList.remove('active');
                tabMatches.classList.remove('active');

                if (panelName === 'players') {
                    playersPanel.style.display = 'block';
                    tabPlayers.classList.add('active');
                } else if (panelName === 'teams') {
                    teamsPanel.style.display = 'block';
                    tabTeams.classList.add('active');
                } else if (panelName === 'matches') {
                    matchesPanel.style.display = 'block';
                    tabMatches.classList.add('active');
                }
            }

            tabPlayers.addEventListener('click', () => showPanel('players'));
            tabTeams.addEventListener('click', () => showPanel('teams'));
            tabMatches.addEventListener('click', () => showPanel('matches'));

            // 启动加载
            loadAllData();
        })();
    </script>
</body>
</html>
