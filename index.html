<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 FURRY CUP · 福瑞杯 · 官方赛事中心</title>

    <!-- 网站图标（请替换为你的 Raw 链接） -->
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/你的用户名/furrycup/main/furrycup.ico">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/你的用户名/furrycup/main/furrycup.ico">

    <!-- 引入外部 CSS（如果你使用单独文件） -->
    <link rel="stylesheet" href="style.css">

    <!-- 或者直接将 CSS 内嵌于此（取消注释下一行并粘贴上面 CSS） -->
    <!-- <style> ... 粘贴上面完整 CSS ... </style> -->

    <!-- 字体与图标（已在 CSS 中引用，但为了保险可保留） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🐾 FURRY CUP</h1>
            <div class="subhead">
                <span><i class="fa-regular fa-calendar"></i> 福瑞杯 · 创立于2026</span>
                <span><i class="fa-regular fa-users"></i> 海神开剥了 vs 雕长三万里</span>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" id="tabPlayers"><i class="fas fa-user-astronaut"></i> 选手数据</button>
            <button class="tab-btn" id="tabTeams"><i class="fas fa-shield-halved"></i> 战队信息</button>
            <button class="tab-btn" id="tabMatches"><i class="fas fa-trophy"></i> 比赛比分</button>
        </div>

        <!-- 选手面板 -->
        <div id="playersPanel" class="panel">
            <h2><i class="fas fa-user-astronaut"></i> 选手数据 · 击杀/死亡/助攻</h2>
            <div id="leaderboardContainer" class="leaderboard"><!-- 排行榜动态渲染 --></div>
            <div id="playersContent" class="grid"><div class="loading"><i class="fas fa-spinner"></i> 加载选手数据中...</div></div>
        </div>

        <!-- 战队面板 -->
        <div id="teamsPanel" class="panel" style="display: none;">
            <h2><i class="fas fa-shield-halved"></i> 参赛战队</h2>
            <div id="teamsContent" class="grid"><div class="loading"><i class="fas fa-spinner"></i> 加载战队数据中...</div></div>
        </div>

        <!-- 比赛面板 -->
        <div id="matchesPanel" class="panel" style="display: none;">
            <h2><i class="fas fa-trophy"></i> 比赛赛程 & 比分</h2>
            <div id="matchesContent" class="grid"><div class="loading"><i class="fas fa-spinner"></i> 加载比赛数据中...</div></div>
        </div>

        <div class="footer">
            <i class="fa-regular fa-heart"></i> 数据托管于 GitHub · 福瑞杯专属 · 手动更新 <i class="fa-regular fa-heart"></i>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 配置：数据文件路径 ----------
            const DATA_PATH = './data/';   // 确保 data 文件夹与 index.html 同级

            // DOM 元素
            const playersPanel = document.getElementById('playersPanel');
            const teamsPanel = document.getElementById('teamsPanel');
            const matchesPanel = document.getElementById('matchesPanel');
            const playersContent = document.getElementById('playersContent');
            const teamsContent = document.getElementById('teamsContent');
            const matchesContent = document.getElementById('matchesContent');
            const leaderboardContainer = document.getElementById('leaderboardContainer');

            const tabPlayers = document.getElementById('tabPlayers');
            const tabTeams = document.getElementById('tabTeams');
            const tabMatches = document.getElementById('tabMatches');

            let playersData = [];
            let teamsData = [];
            let matchesData = [];

            async function fetchLocalJSON(filename) {
                const url = DATA_PATH + filename;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status} : 无法加载 ${filename}`);
                return await res.json();
            }

            // ---------- 排行榜（按击杀数取前5）----------
            function renderLeaderboard(players) {
                if (!players || players.length === 0) return '';
                const sorted = [...players].sort((a,b) => (b.kills||0) - (a.kills||0)).slice(0,5);
                let html = '<h3><i class="fas fa-crown"></i> 击杀榜 TOP5</h3><div class="leaderboard-grid">';
                sorted.forEach((p, idx) => {
                    const kd = p.deaths ? (p.kills / p.deaths).toFixed(2) : p.kills.toFixed(2);
                    html += `
                        <div class="leaderboard-card">
                            <div class="leaderboard-rank">#${idx+1}</div>
                            <div class="leaderboard-info">
                                <div class="leaderboard-name">${p.name || '无名'}</div>
                                <div class="leaderboard-stats">
                                    <span><i class="fas fa-skull"></i> ${p.kills||0}</span>
                                    <span><i class="fas fa-bolt"></i> ${kd}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                return html;
            }

            // ---------- 渲染选手卡片 ----------
            function renderPlayers(players) {
                if (!players || !players.length) return '<div class="error">暂无选手数据</div>';
                let html = '';
                players.forEach(p => {
                    const kills = p.kills || 0;
                    const deaths = p.deaths || 0;
                    const assists = p.assists || 0;
                    const kd = deaths === 0 ? kills.toFixed(2) : (kills / deaths).toFixed(2);
                    html += `
                        <div class="player-card">
                            <div class="player-name">${p.name || '无名'}</div>
                            <div class="stats">
                                <div class="stat-item"><span class="stat-label">击杀</span><div class="stat-value">${kills}</div></div>
                                <div class="stat-item"><span class="stat-label">死亡</span><div class="stat-value">${deaths}</div></div>
                                <div class="stat-item"><span class="stat-label">助攻</span><div class="stat-value">${assists}</div></div>
                            </div>
                            <div class="kd-badge"><i class="fas fa-bolt"></i> KD: ${kd}</div>
                        </div>
                    `;
                });
                return html;
            }

            // ---------- 渲染战队卡片（基于 teams.json 和 players.json）----------
            function renderTeams(teams, players) {
                if (!teams || !teams.length) return '<div class="error">暂无战队数据</div>';
                let html = '';
                teams.forEach(t => {
                    // 从 players 中筛选出属于该战队的选手（根据 team 字段匹配战队名）
                    const teamPlayers = players.filter(p => p.team === t.name);
                    const memberNames = teamPlayers.map(p => p.name);
                    html += `
                        <div class="team-card">
                            <div class="team-header"><h3>${t.name || '未知战队'}</h3></div>
                            <div style="opacity:0.6; font-size:0.9rem; margin-bottom:1rem;"><i class="fas fa-tag"></i> ${t.id}</div>
                            <div class="team-members">
                                <li style="list-style:none; color:#ff5e0d;"><i class="fas fa-users"></i> 队员列表</li>
                                ${memberNames.length ? memberNames.map(name => `<li><i class="fas fa-paw"></i> ${name}</li>`).join('') : '<li>暂无队员</li>'}
                            </div>
                        </div>
                    `;
                });
                return html;
            }

            // ---------- 渲染比赛（按日期分组）----------
            function renderMatches(matches, teams) {
                if (!matches || !matches.length) return '<div class="error">暂无比赛数据</div>';

                // 获取队名辅助函数
                const getTeamName = (id) => {
                    const t = teams.find(t => t.id === id);
                    return t ? t.name : id;
                };

                // 按日期分组
                const groups = {};
                matches.forEach(m => {
                    const date = m.date || '待定';
                    if (!groups[date]) groups[date] = [];
                    groups[date].push(m);
                });

                // 排序日期（最近的在前）
                const sortedDates = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));

                let html = '';
                sortedDates.forEach(date => {
                    const isToday = date === new Date().toISOString().slice(0,10);
                    const isTomorrow = new Date(date) - new Date() > 0 && new Date(date) - new Date() < 86400000*2;
                    let dateLabel = date;
                    if (isToday) dateLabel = '今天';
                    else if (isTomorrow) dateLabel = '明天';

                    html += `<div class="match-date-group"><div class="match-date-header"><i class="fa-regular fa-calendar"></i> ${dateLabel}</div>`;

                    groups[date].forEach(m => {
                        const teamAName = getTeamName(m.teamA?.id);
                        const teamBName = getTeamName(m.teamB?.id);
                        const scoreA = m.teamA?.score ?? 0;
                        const scoreB = m.teamB?.score ?? 0;
                        const statusClass = m.status === 'completed' ? 'status-completed' : (m.status === 'scheduled' ? 'status-scheduled' : '');
                        const statusText = m.status === 'completed' ? '已结束' : (m.status === 'scheduled' ? '未开始' : m.status);
                        const timeStr = m.time ? `<i class="fa-regular fa-clock"></i> ${m.time}` : '';

                        html += `
                            <div class="match-card">
                                <div class="match-teams">
                                    <span>${teamAName}</span>
                                    <span class="score">${scoreA} : ${scoreB}</span>
                                    <span>${teamBName}</span>
                                </div>
                                <div class="match-footer">
                                    <span class="match-status ${statusClass}">${statusText}</span>
                                    <span>${timeStr}</span>
                                </div>
                                ${m.maps && m.maps.length ? `<div style="margin-top:0.8rem; opacity:0.7;"><i class="fa-regular fa-map"></i> ${m.maps.join(' · ')}</div>` : ''}
                            </div>
                        `;
                    });
                    html += '</div>';
                });
                return html;
            }

            // ---------- 加载所有数据 ----------
            async function loadAllData() {
                try {
                    const [players, teams, matches] = await Promise.all([
                        fetchLocalJSON('players.json'),
                        fetchLocalJSON('teams.json'),
                        fetchLocalJSON('matches.json')
                    ]);
                    playersData = players;
                    teamsData = teams;
                    matchesData = matches;

                    // 渲染选手面板（排行榜 + 卡片）
                    leaderboardContainer.innerHTML = renderLeaderboard(playersData);
                    playersContent.innerHTML = renderPlayers(playersData);

                    // 渲染战队面板
                    teamsContent.innerHTML = renderTeams(teamsData, playersData);

                    // 渲染比赛面板
                    matchesContent.innerHTML = renderMatches(matchesData, teamsData);
                } catch (error) {
                    console.error(error);
                    const errHtml = `<div class="error"><i class="fas fa-exclamation-triangle"></i> 加载失败: ${error.message}</div>`;
                    playersContent.innerHTML = errHtml;
                    teamsContent.innerHTML = errHtml;
                    matchesContent.innerHTML = errHtml;
                }
            }

            // ---------- 标签切换 ----------
            function showPanel(name) {
                playersPanel.style.display = 'none';
                teamsPanel.style.display = 'none';
                matchesPanel.style.display = 'none';
                tabPlayers.classList.remove('active');
                tabTeams.classList.remove('active');
                tabMatches.classList.remove('active');

                if (name === 'players') {
                    playersPanel.style.display = 'block';
                    tabPlayers.classList.add('active');
                } else if (name === 'teams') {
                    teamsPanel.style.display = 'block';
                    tabTeams.classList.add('active');
                } else if (name === 'matches') {
                    matchesPanel.style.display = 'block';
                    tabMatches.classList.add('active');
                }
            }

            tabPlayers.addEventListener('click', () => showPanel('players'));
            tabTeams.addEventListener('click', () => showPanel('teams'));
            tabMatches.addEventListener('click', () => showPanel('matches'));

            // 启动
            loadAllData();
        })();
    </script>
</body>
</html>
